<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart — Herbique</title>
<link rel="stylesheet" href="shared.css">
<style>
.page-header { background: var(--gray-bg); padding: 36px 5%; border-bottom: 1px solid var(--border); }
.page-header h1 { font-size: 1.8rem; font-weight: 800; color: var(--dark); }
.cart-layout { display: grid; grid-template-columns: 1fr 340px; gap: 28px; padding: 36px 5%; max-width: 1200px; margin: 0 auto; }
.cart-items { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.cart-header { padding: 18px 24px; background: var(--gray-bg); border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); }
.cart-row { padding: 20px 24px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; align-items: center; border-bottom: 1px solid var(--border); transition: background .2s; }
.cart-row:last-child { border-bottom: none; }
.cart-row:hover { background: var(--gray-bg); }
.cart-product { display: flex; align-items: center; gap: 14px; }
.cart-emoji { width: 56px; height: 56px; border-radius: 12px; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
.cart-product-name { font-size: 14px; font-weight: 600; color: var(--dark); line-height: 1.4; }
.cart-product-price { font-size: 12px; color: var(--muted); margin-top: 2px; }
.qty-control { display: flex; align-items: center; gap: 8px; }
.qty-btn { width: 28px; height: 28px; border: 1.5px solid var(--border); border-radius: 8px; background: #fff; font-size: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .2s; color: var(--dark); }
.qty-btn:hover { border-color: var(--green); color: var(--green); }
.qty-num { font-size: 14px; font-weight: 600; color: var(--dark); min-width: 20px; text-align: center; }
.item-total { font-size: 15px; font-weight: 700; color: var(--dark); }
.remove-btn { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; transition: color .2s; justify-self: end; }
.remove-btn:hover { color: var(--red); }
.empty-cart { padding: 64px; text-align: center; }
.empty-cart .ec-icon { font-size: 56px; margin-bottom: 16px; }
.empty-cart h3 { font-size: 18px; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
.empty-cart p { color: var(--muted); margin-bottom: 24px; font-size: 14px; }

/* SUMMARY */
.cart-summary { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; height: fit-content; position: sticky; top: 88px; }
.summary-title { font-size: 15px; font-weight: 700; color: var(--dark); margin-bottom: 20px; }
.summary-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--muted); margin-bottom: 12px; }
.summary-row.total { font-size: 16px; font-weight: 700; color: var(--dark); padding-top: 14px; margin-top: 2px; border-top: 1px solid var(--border); margin-bottom: 20px; }
.summary-row.free { color: var(--green); font-weight: 600; }
.checkout-btn { width: 100%; padding: 14px; background: var(--green); color: #fff; border: none; border-radius: 50px; font-size: 15px; font-weight: 700; font-family: 'Poppins', sans-serif; cursor: pointer; transition: all .25s; margin-bottom: 12px; }
.checkout-btn:hover { background: var(--green-dark); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(109,190,69,.3); }
.continue-btn { width: 100%; padding: 12px; background: none; border: 1.5px solid var(--border); border-radius: 50px; font-size: 14px; font-weight: 600; font-family: 'Poppins', sans-serif; color: var(--muted); cursor: pointer; transition: all .2s; }
.continue-btn:hover { border-color: var(--green); color: var(--green); }
.coupon-row { display: flex; gap: 8px; margin-bottom: 18px; }
.coupon-row input { flex: 1; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 13px; font-family: 'Poppins', sans-serif; outline: none; }
.coupon-row input:focus { border-color: var(--green); }
.coupon-row button { padding: 10px 16px; background: var(--dark); color: #fff; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; font-family: 'Poppins', sans-serif; cursor: pointer; }
.trust-badges { display: flex; gap: 12px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
.trust-badge { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; }

@media(max-width:900px){ .cart-layout { grid-template-columns: 1fr; } .cart-header,.cart-row { grid-template-columns: 2fr 1fr 1fr auto; } }
@media(max-width:560px){ .cart-header { display: none; } .cart-row { grid-template-columns: 1fr auto; gap: 12px; } .item-total { grid-column: 1; } .qty-control { grid-column: 1; } }
</style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="nav-logo"><div class="nav-logo-icon">🌿</div><span class="nav-logo-text">Herbique</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li><li><a href="products.html">Shop</a></li><li><a href="about.html">About</a></li><li><a href="cart.html" class="active">Cart</a></li>
  </ul>
  <div class="nav-right">
    <a href="cart.html" class="nav-cart">🛒<span class="cart-badge">0</span></a>
    <a href="login.html" class="btn btn-primary btn-sm">Sign In</a>
    <div class="burger" id="burger"><span></span><span></span><span></span></div>
  </div>
</nav>
<div class="mobile-menu" id="mobile-menu">
  <a href="index.html">Home</a><a href="products.html">Shop</a><a href="about.html">About</a><a href="cart.html">Cart</a><a href="login.html">Sign In</a>
</div>

<div class="page-header">
  <h1>Shopping Cart <span id="cartCount" style="font-size:1rem;color:var(--muted);font-weight:500"></span></h1>
</div>

<div class="cart-layout">
  <div>
    <div class="cart-items" id="cartItems"></div>
  </div>
  <div class="cart-summary" id="cartSummary"></div>
</div>

<div class="toast" id="toast"></div>
<script src="shared.js"></script>
<script>
function renderCart() {
  const itemsEl = document.getElementById('cartItems');
  const summaryEl = document.getElementById('cartSummary');
  const countEl = document.getElementById('cartCount');

  if (cart.length === 0) {
    itemsEl.innerHTML = `<div class="empty-cart"><div class="ec-icon">🛒</div><h3>Your cart is empty</h3><p>Add some products to get started</p><a href="products.html" class="btn btn-primary">Shop Now</a></div>`;
    summaryEl.innerHTML = '';
    countEl.textContent = '';
    return;
  }

  countEl.textContent = `(${cart.reduce((s,i)=>s+i.qty,0)} items)`;

  itemsEl.innerHTML = `
    <div class="cart-header"><span>Product</span><span>Price</span><span>Quantity</span><span>Total</span></div>
    ${cart.map(item => `
      <div class="cart-row">
        <div class="cart-product">
          <div class="cart-emoji">${item.emoji}</div>
          <div>
            <div class="cart-product-name">${item.name}</div>
            <div class="cart-product-price">₹${item.price} each</div>
          </div>
        </div>
        <div style="font-size:14px;font-weight:600;color:var(--dark)">₹${item.price}</div>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span class="item-total">₹${item.price * item.qty}</span>
          <button class="remove-btn" onclick="removeItem(${item.id})">🗑</button>
        </div>
      </div>`).join('')}`;

  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const shipping = subtotal >= 500 ? 0 : 49;
  const total = subtotal + shipping;

  summaryEl.innerHTML = `
    <div class="summary-title">Order Summary</div>
    <div class="coupon-row">
      <input type="text" placeholder="Coupon code..." id="couponInput">
      <button onclick="applyCoupon()">Apply</button>
    </div>
    <div class="summary-row"><span>Subtotal (${cart.reduce((s,i)=>s+i.qty,0)} items)</span><span>₹${subtotal}</span></div>
    <div class="summary-row ${shipping === 0 ? 'free' : ''}"><span>Shipping</span><span>${shipping === 0 ? '🎉 FREE' : '₹' + shipping}</span></div>
    ${shipping > 0 ? `<div style="font-size:11px;color:var(--muted);margin-bottom:12px">Add ₹${500-subtotal} more for free shipping</div>` : ''}
    <div class="summary-row total"><span>Total</span><span>₹${total}</span></div>
    <button class="checkout-btn" onclick="showToast('✅ Proceeding to checkout!')">Proceed to Checkout →</button>
    <button class="continue-btn" onclick="window.location='products.html'">← Continue Shopping</button>
    <div class="trust-badges">
      <span class="trust-badge">🔒 Secure</span>
      <span class="trust-badge">↩️ Easy Returns</span>
      <span class="trust-badge">🚚 Fast Delivery</span>
    </div>`;
}

function changeQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
  saveCart(); updateCartBadge(); renderCart();
}

function removeItem(id) {
  cart = cart.filter(i => i.id !== id);
  saveCart(); updateCartBadge(); renderCart();
  showToast('🗑 Item removed');
}

function applyCoupon() {
  const val = document.getElementById('couponInput')?.value?.toUpperCase();
  if (val === 'HERBIQUE10') showToast('🎉 10% discount applied!');
  else showToast('❌ Invalid coupon code', 'error');
}

document.addEventListener('DOMContentLoaded', renderCart);
</script>
</body>
</html>
